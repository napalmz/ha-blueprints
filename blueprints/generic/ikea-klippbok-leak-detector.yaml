# ===================================================================
# 💧 Allerta perdite per sensori selezionati (Matter)
# Versione: 1.0.0
#
# Monitora SOLO i sensori selezionati.
# Avvisa quando uno qualsiasi diventa bagnato.
# Invia il messaggio di rientro quando tutti sono asciutti da N minuti configurabili.
# Le notifiche di sistema funzionano sempre.
# Le notifiche mobile sono opzionali.
#
# Basata su blueprint originale di censay.
# ===================================================================

blueprint:
  name: 💧 Allerta perdite per sensori selezionati (Matter)
  author: napalmz
  description: |
    Monitora i sensori di umidita/perdita selezionati e invia una notifica
    persistente quando ne rileva uno bagnato. Invia una notifica di rientro
    quando tutti i sensori risultano asciutti per il tempo configurato.
    Le notifiche mobile sono opzionali.

    ℹ️ Version 2026.03.19
  domain: automation
  homeassistant:
    min_version: 2025.12.1

  input:

    moisture_sensors:
      name: 💧 Sensori perdita da monitorare
      selector:
        entity:
          multiple: true
          domain: binary_sensor
          device_class: moisture

    notify_mobile:
      name: 📱 Invia notifiche mobile
      description: |
        Invia notifiche anche a notify.notify. Se l'app mobile non e configurata,
        l'automazione continua a funzionare senza errori.
      default: false
      selector:
        boolean: {}

    dry_for_minutes:
      name: Minuti prima del rientro
      description: |
        Tempo di attesa (in minuti) con tutti i sensori asciutti prima di notificare il rientro.
      default: 15
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: minutes
          mode: slider

    wet_title:
      name: Titolo notifica allarme
      default: "💧 Perdita rilevata"
      selector:
        text: {}

    wet_message:
      name: Messaggio notifica allarme
      description: |
        Placeholder supportati: {sensor_name}, {sensor_entity}.
      default: "{sensor_name} è BAGNATO ({sensor_entity})."
      selector:
        text:
          multiline: true

    dry_title:
      name: Titolo notifica rientro
      default: "☀️ Asciutto"
      selector:
        text: {}

    dry_message:
      name: Messaggio notifica rientro
      description: |
        Messaggio inviato quando tutti i sensori sono asciutti per il tempo configurato.
      default: "Tutti i sensori risultano asciutti."
      selector:
        text:
          multiline: true

    wet_actions:
      name: Azioni aggiuntive su bagnato
      description: |
        Azioni opzionali da eseguire quando un sensore rileva bagnato.
        
        Variabili utilizzabili nei template delle azioni:
        - trigger.id
        - sensor_name
        - sensor_entity
        - wet_title
        - wet_message_template
        - wet_message_rendered
        - dry_title
        - dry_message_template
        - dry_message_rendered
        - notify_mobile
        - all_dry

        Esempio messaggio Telegram: {{ wet_message_rendered }}
      default: []
      selector:
        action: {}

    dry_actions:
      name: Azioni aggiuntive su asciutto
      description: |
        Azioni opzionali da eseguire quando tutti i sensori sono asciutti.

        Variabili utilizzabili nei template delle azioni:
        - trigger.id
        - sensor_name
        - sensor_entity
        - wet_title
        - wet_message_template
        - wet_message_rendered
        - dry_title
        - dry_message_template
        - dry_message_rendered
        - notify_mobile
        - all_dry
        
        Esempio messaggio Telegram: {{ dry_message_rendered }}
      default: []
      selector:
        action: {}

# ===================================================================
# LOGICA AUTOMAZIONE
# ===================================================================

trigger:
  - platform: state
    id: wet
    entity_id: !input moisture_sensors
    to: "on"

  - platform: state
    id: dry
    entity_id: !input moisture_sensors
    to: "off"
    for:
      minutes: !input dry_for_minutes

condition: []

action:

  - variables:
      moisture_sensors: !input moisture_sensors
      all_dry: >
        {{ expand(moisture_sensors)
          | rejectattr('state', 'eq', 'off')
          | list
          | count == 0 }}
      sensor_name: "{{ trigger.to_state.name }}"
      sensor_entity: "{{ trigger.entity_id }}"
      notify_mobile: !input notify_mobile
      wet_title: !input wet_title
      wet_message_template: !input wet_message
      dry_title: !input dry_title
      dry_message_template: !input dry_message
      wet_message_rendered: >
        {{ wet_message_template
          | replace('{sensor_name}', sensor_name)
          | replace('{sensor_entity}', sensor_entity) }}
      dry_message_rendered: "{{ dry_message_template }}"

  - choose:

      # -----------------------------------------------------------
      # 💧 ALLARME PERDITA
      # -----------------------------------------------------------
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'wet' }}"
        sequence:

          # 🏠 Notifica di sistema (sempre disponibile)
          - service: persistent_notification.create
            data:
              title: "{{ wet_title }}"
              message: "{{ wet_message_rendered }}"

          # 📱 Notifica mobile (opzionale)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ notify_mobile }}"
                sequence:
                  - service: notify.notify
                    data:
                      title: "{{ wet_title }}"
                      message: "{{ wet_message_rendered }}"
            default: []

          # ⚙️ Azioni aggiuntive su bagnato
          - sequence: !input wet_actions

      # -----------------------------------------------------------
      # ☀️ RIENTRO
      # -----------------------------------------------------------
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'dry' and all_dry }}"
        sequence:

          # 🏠 Notifica di sistema (sempre disponibile)
          - service: persistent_notification.create
            data:
              title: "{{ dry_title }}"
              message: "{{ dry_message_rendered }}"

          # 📱 Notifica mobile (opzionale)
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ notify_mobile }}"
                sequence:
                  - service: notify.notify
                    data:
                      title: "{{ dry_title }}"
                      message: "{{ dry_message_rendered }}"
            default: []

          # ⚙️ Azioni aggiuntive su asciutto
          - sequence: !input dry_actions

mode: restart
